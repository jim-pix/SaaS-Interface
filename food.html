<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EasyAI — Food DA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1a2a3a; --bg-deep:#0f1c28;
  --surface:rgba(255,255,255,0.06); --surface-mid:rgba(255,255,255,0.10);
  --border:rgba(255,255,255,0.12); --border-mid:rgba(255,255,255,0.20);
  --accent:#e8d5b0; --accent-dim:rgba(232,213,176,0.4); --accent-glow:rgba(232,213,176,0.15);
  --text:#f0ece4; --text-dim:rgba(240,236,228,0.45); --text-mid:rgba(240,236,228,0.72);
  --green:#7ec89e; --red:#e07060;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;font-weight:300;color:var(--text);background:var(--bg-deep);}

.fond{position:fixed;inset:0;background:#0a1420;z-index:0;}
.fond::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(232,213,176,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(122,175,212,.03) 0%,transparent 50%);}

.page{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;transition:opacity .3s,transform .3s;}
.page.hidden{opacity:0;pointer-events:none;transform:translateY(8px);}

/* ── AUTH ── */
#page-auth{align-items:center;justify-content:center;padding:32px 24px;}
.auth-card{width:100%;max-width:360px;background:rgba(15,25,38,.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border-mid);padding:40px 32px 36px;display:flex;flex-direction:column;align-items:center;gap:24px;position:relative;}
.auth-card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:50%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.auth-logo-name{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;letter-spacing:.12em;color:var(--accent);}
.auth-logo-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-top:4px;text-align:center;}
.auth-field{width:100%;display:flex;flex-direction:column;gap:6px;}
.auth-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);}
.auth-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:12px 14px;outline:none;letter-spacing:.08em;transition:border-color .2s;-webkit-appearance:none;border-radius:0;}
.auth-input:focus{border-color:var(--accent-dim);}
.auth-btn{width:100%;background:var(--accent);color:#0f1c28;border:none;padding:14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.auth-btn:hover{opacity:.88;}
.auth-error{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.06em;text-align:center;min-height:14px;}

/* ── MAIN ── */
#page-main{flex-direction:column;align-items:center;}
.main-header{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(10,18,30,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.main-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;letter-spacing:.1em;color:var(--accent);}
.main-logo em{font-size:11px;color:var(--text-dim);margin-left:6px;font-style:normal;font-family:'DM Mono',monospace;letter-spacing:.1em;}
.led{width:6px;height:6px;border-radius:50%;background:var(--text-dim);transition:background .3s;}
.led.on{background:var(--green);box-shadow:0 0 6px var(--green);}
.logout-btn{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);background:none;border:1px solid var(--border);padding:4px 10px;cursor:pointer;transition:color .2s,border-color .2s;}
.logout-btn:hover{color:var(--text);border-color:var(--border-mid);}
.main-body{flex:1;position:relative;overflow:hidden;min-height:0;width:100%;max-width:480px;}

/* ── UPLOAD ── */
.upload-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:32px 24px;transition:opacity .3s,transform .3s;}
.upload-screen.hidden{opacity:0;pointer-events:none;transform:translateY(-16px);}
.upload-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:.1em;color:var(--accent);text-align:center;}
.upload-logo em{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--text-dim);font-style:normal;margin-top:4px;}
.drop-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:300px;}
.drop-big{width:100%;aspect-ratio:3/4;border:1px dashed var(--border-mid);background:rgba(255,255,255,.04);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s,background .2s;}
.drop-big:hover{border-color:var(--accent-dim);background:rgba(255,255,255,.07);}
.drop-big.filled{border:1px solid var(--accent-dim);}
.drop-big img.preview-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
.drop-big.filled img.preview-photo{display:block;}
.drop-big.filled .drop-big-ico,.drop-big.filled .drop-big-hint{display:none;}
.drop-big-ico{font-size:28px;opacity:.18;}
.drop-big-hint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--text-dim);text-align:center;line-height:1.6;}
.format-selector{display:flex;width:100%;border:1px solid var(--border);overflow:hidden;}
.fmt-btn{flex:1;background:transparent;border:none;border-right:1px solid var(--border);color:var(--text-dim);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:10px 4px;cursor:pointer;transition:background .2s,color .2s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.fmt-btn:last-child{border-right:none;}
.fmt-btn:hover{background:rgba(255,255,255,.04);color:var(--text);}
.fmt-btn.active{background:rgba(232,213,176,.08);color:var(--accent);}
.fmt-icon{border:1.5px solid currentColor;opacity:.65;}
.fmt-icon.landscape{width:20px;height:13px;}
.fmt-icon.portrait{width:13px;height:20px;}
.fmt-icon.square{width:16px;height:16px;}
.start-btn{width:100%;background:var(--accent);color:#0f1c28;border:none;padding:14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:.08em;cursor:pointer;transition:opacity .2s;text-transform:uppercase;}
.start-btn:hover{opacity:.85;}
.start-btn:disabled{opacity:.25;cursor:not-allowed;}

/* ── BOTTOM SHEET ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(5,12,22,.7);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.sheet-overlay.open{opacity:1;pointer-events:all;}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:201;background:#0d1e2e;border-top:1px solid var(--border-mid);padding-bottom:calc(16px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);}
.bottom-sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:3px;background:var(--border-mid);border-radius:2px;margin:12px auto 0;}
.sheet-title{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:300;letter-spacing:.12em;color:var(--text-dim);text-align:center;padding:12px 24px 6px;text-transform:uppercase;}
.sheet-sep{height:1px;background:var(--border);margin:0 24px 4px;}
.sheet-item{display:flex;align-items:center;gap:16px;padding:14px 28px;cursor:pointer;transition:background .15s;border:none;background:transparent;width:100%;text-align:left;}
.sheet-item:hover,.sheet-item:active{background:rgba(255,255,255,.04);}
.sheet-item-icon{width:36px;height:36px;border:1px solid var(--border);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.sheet-item-label{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);}
.sheet-item-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--text-dim);text-transform:uppercase;margin-top:2px;}
.sheet-item-arrow{font-size:12px;color:var(--accent-dim);margin-left:auto;}
.sheet-cancel{display:flex;align-items:center;justify-content:center;padding:13px;margin:4px 24px 0;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);width:calc(100% - 48px);transition:color .2s,border-color .2s;}
.sheet-cancel:hover{color:var(--text);border-color:var(--border-mid);}

/* ── SESSION ── */
.session-screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateY(20px);transition:opacity .3s,transform .3s;}
.session-screen.active{opacity:1;pointer-events:all;transform:translateY(0);}
.session-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(10,18,30,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);flex-shrink:0;}
.session-thumb{width:42px;height:42px;object-fit:cover;border:1px solid var(--accent-dim);flex-shrink:0;}
.session-info{flex:1;min-width:0;}
.session-info-name{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--accent);letter-spacing:.06em;}
.session-info-sub{font-family:'DM Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.cancel-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:6px 10px;cursor:pointer;flex-shrink:0;transition:color .2s,border-color .2s;}
.cancel-btn:hover{color:var(--text);border-color:var(--border-mid);}
.session-content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;min-height:0;}
.session-content::-webkit-scrollbar{width:2px;}
.session-content::-webkit-scrollbar-thumb{background:var(--border);}

/* ── Phase label ── */
.phase-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-dim);display:flex;align-items:center;gap:8px;}
.phase-label::after{content:'';flex:1;height:1px;background:var(--border);}
.phase-block{display:flex;flex-direction:column;gap:10px;}

/* ── Spinner analyse ── */
.analyse-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:28px 0;}
.analyse-dots{display:flex;gap:6px;}
.analyse-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:adot 1.2s infinite;opacity:.2;}
.analyse-dot:nth-child(2){animation-delay:.15s}.analyse-dot:nth-child(3){animation-delay:.3s}
@keyframes adot{0%,100%{opacity:.2;transform:scale(1)}40%{opacity:1;transform:scale(1.3)}}
.analyse-txt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--text-dim);}

/* ── Grids (previews + prod) ── */
.previews-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:4px;}
.prod-grid{display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.prod-grid::-webkit-scrollbar{display:none;}

/* Preview cards (styles) */
.preview-card{position:relative;border:1px solid var(--border);background:var(--surface);overflow:hidden;cursor:pointer;transition:border-color .2s;aspect-ratio:1/1;border-radius:10px;}
.preview-card.selected{border:2px solid var(--accent);}
.preview-card.dimmed{opacity:.4;}
.preview-card.no-ready{cursor:default;}
.preview-card img{width:100%;height:100%;object-fit:cover;display:block;}
.pc-shimmer{position:absolute;inset:0;}
.pc-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:blur(8px) brightness(.4);}
.preview-scan{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.preview-scan::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);animation:scan 1.8s ease-in-out infinite;}
@keyframes scan{0%{left:-60%}100%{left:160%}}
.pc-label{position:absolute;bottom:0;left:0;right:0;padding:10px 8px 8px;background:linear-gradient(to top,rgba(10,18,30,.92),transparent);}
.pc-name{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);}
.pc-desc{font-size:11px;color:var(--text-mid);margin-top:3px;font-style:italic;}
.pc-status{font-family:'DM Mono',monospace;font-size:8px;color:var(--text-dim);margin-top:2px;}

/* Production cards (HD + vidéos) */
.prod-card{flex:0 0 calc(75vw);max-width:220px;scroll-snap-align:start;position:relative;border:1px solid var(--border);background:var(--surface);overflow:hidden;aspect-ratio:9/16;}
.prod-card img,.prod-card video{width:100%;height:100%;object-fit:cover;display:block;}
.prod-card.clickable{cursor:pointer;}
.prod-card.selected{border:2px solid var(--accent);}
.prod-card-label{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(to top,rgba(10,18,30,.9),transparent);font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);}

/* Progress bar */
.progress-bar-wrap{display:flex;flex-direction:column;gap:6px;}
.progress-steps{display:flex;gap:3px;}
.progress-step{flex:1;height:2px;background:var(--border);position:relative;overflow:hidden;}
.progress-step.done{background:var(--accent);}
.progress-step.active::after{content:'';position:absolute;inset:0;background:var(--accent);animation:pfill 2s ease-in-out infinite;}
@keyframes pfill{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(1);transform-origin:left}51%{transform:scaleX(1);transform-origin:right}100%{transform:scaleX(0);transform-origin:right}}
.progress-txt{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--text-dim);}

/* Buttons */
.final-btn{width:100%;background:var(--accent);color:#0f1c28;border:none;padding:14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:.08em;cursor:pointer;text-transform:uppercase;transition:opacity .2s;display:block;text-align:center;text-decoration:none;}
.final-btn:hover{opacity:.85;}
.secondary-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:11px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;cursor:pointer;text-transform:uppercase;transition:color .2s,border-color .2s;}
.secondary-btn:hover{color:var(--text);border-color:var(--border-mid);}
.err-msg{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.06em;padding:8px 0;}
.sub-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);}

*{scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

/* ── DEBUG PANEL ── */
#debug-panel{position:fixed;bottom:0;left:0;right:0;z-index:999;background:rgba(5,10,18,.95);border-top:1px solid #e07060;font-family:'DM Mono',monospace;font-size:10px;max-height:38vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s;pointer-events:none;}
#debug-panel.open{transform:translateY(0);pointer-events:all;}
#debug-toggle{position:fixed;bottom:0;right:12px;z-index:1000;background:#e07060;color:#fff;border:none;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;padding:4px 10px;cursor:pointer;border-radius:4px 4px 0 0;}
#debug-log{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:3px;}
#debug-log::-webkit-scrollbar{width:2px;}
.dbg-entry{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05);line-height:1.4;word-break:break-all;}
.dbg-entry.req{color:#7ec89e;}
.dbg-entry.res-ok{color:#a0c8e0;}
.dbg-entry.res-err{color:#e07060;}
.dbg-entry.info{color:rgba(240,236,228,.45);}
#debug-clear{background:transparent;border:none;color:rgba(240,236,228,.3);font-family:'DM Mono',monospace;font-size:9px;padding:4px 10px;cursor:pointer;border-top:1px solid rgba(255,255,255,.08);text-align:left;}

@supports(padding-top:env(safe-area-inset-top)){
  .main-header{padding-top:calc(14px + env(safe-area-inset-top));}
  .session-bar{padding-top:calc(8px + env(safe-area-inset-top));}
}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .session-content{padding-bottom:calc(24px + env(safe-area-inset-bottom));}
}

/* ── LIGHTBOX ── */
#lightbox{position:fixed;inset:0;z-index:500;background:rgba(5,10,18,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
#lightbox.open{opacity:1;pointer-events:all;}
#lightbox img{max-width:100%;max-height:80vh;object-fit:contain;display:block;}
.lightbox-bar{display:flex;gap:12px;padding:16px 20px calc(16px + env(safe-area-inset-bottom));width:100%;justify-content:center;}
.lb-btn{background:transparent;border:1px solid var(--border-mid);color:var(--text);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:10px 20px;cursor:pointer;transition:border-color .2s;text-decoration:none;display:flex;align-items:center;}
.lb-btn:hover{border-color:var(--accent);}
.lb-btn.accent{background:var(--accent);color:#0f1c28;border-color:var(--accent);}
.lb-ios-hint{font-family:'DM Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:.08em;text-align:center;padding:0 24px 8px;line-height:1.6;}
</style>
</head>
<body>
<div class="fond"></div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox(event)">
  <img id="lb-img" src="">
  <div class="lightbox-bar" onclick="event.stopPropagation()">
    <a id="lb-dl" class="lb-btn accent" download="image_hd.png">↓ Sauvegarder</a>
    <button class="lb-btn" onclick="closeLightbox()">✕ Fermer</button>
  </div>
  <div class="lb-ios-hint" id="lb-ios-hint" style="display:none">Sur iPhone : appuyez longuement sur l'image → "Enregistrer dans Photos"</div>
</div>

<!-- AUTH -->
<div class="page" id="page-auth">
  <div class="auth-card">
    <div>
      <div class="auth-logo-name">EasyAI</div>
      <div class="auth-logo-sub">Food · Directeur Artistique IA</div>
    </div>
    <div style="width:32px;height:1px;background:var(--border-mid)"></div>
    <div class="auth-field">
      <div class="auth-label">Token d'accès</div>
      <input class="auth-input" type="password" id="tokenInput" placeholder="••••••••••••"
        onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <button class="auth-btn" onclick="doAuth()">Accéder →</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- MAIN -->
<div class="page hidden" id="page-main">
  <div class="main-header">
    <div class="main-logo">EasyAI <em>Food DA</em></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="led" id="led"></div>
      <button class="logout-btn" onclick="doLogout()">↩ Quitter</button>
    </div>
  </div>
  <div class="main-body">

    <!-- ÉCRAN UPLOAD -->
    <div class="upload-screen" id="upload-screen">
      <div class="upload-logo">EasyAI <em>Food · Directeur Artistique IA</em></div>
      <div class="drop-wrap">
        <div class="drop-big" id="dz" onclick="openSheet()">
          <div class="drop-big-ico">✦</div>
          <div class="drop-big-hint">Touchez pour<br>charger votre plat</div>
          <img class="preview-photo" id="preview-photo" src="">
        </div>
        <div class="format-selector">
          <button class="fmt-btn active" onclick="setFormat('9:16',this)"><div class="fmt-icon portrait"></div>9:16</button>
          <button class="fmt-btn" onclick="setFormat('1:1',this)"><div class="fmt-icon square"></div>1:1</button>
          <button class="fmt-btn" onclick="setFormat('16:9',this)"><div class="fmt-icon landscape"></div>16:9</button>
        </div>
        <input type="file" id="fi-camera" accept="image/*" capture="environment" style="display:none">
        <input type="file" id="fi-gallery" accept="image/*" style="display:none">
        <input type="file" id="fi-files" accept="image/*,image/heic,image/heif" style="display:none">
        <button class="start-btn" id="startBtn" disabled onclick="startSession()">Analyser ce plat →</button>
      </div>
      <!-- Bottom Sheet -->
      <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
      <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Choisir une image</div>
        <div class="sheet-sep"></div>
        <button class="sheet-item" onclick="triggerInput('camera')">
          <div class="sheet-item-icon">⬤</div>
          <div><div class="sheet-item-label">Appareil photo</div><div class="sheet-item-sub">Prendre une photo maintenant</div></div>
          <div class="sheet-item-arrow">›</div>
        </button>
        <button class="sheet-item" onclick="triggerInput('gallery')">
          <div class="sheet-item-icon">▦</div>
          <div><div class="sheet-item-label">Pellicule</div><div class="sheet-item-sub">Choisir dans vos photos</div></div>
          <div class="sheet-item-arrow">›</div>
        </button>
        <button class="sheet-item" onclick="triggerInput('files')">
          <div class="sheet-item-icon">◫</div>
          <div><div class="sheet-item-label">Fichiers</div><div class="sheet-item-sub">iCloud Drive, Fichiers…</div></div>
          <div class="sheet-item-arrow">›</div>
        </button>
        <button class="sheet-cancel" onclick="closeSheet()">Annuler</button>
      </div>
    </div>

    <!-- ÉCRAN SESSION -->
    <div class="session-screen" id="session-screen">
      <div class="session-bar">
        <img class="session-thumb" id="session-thumb" src="">
        <div class="session-info">
          <div class="session-info-name">EasyAI Food DA</div>
          <div class="session-info-sub" id="session-sub">Analyse en cours…</div>
        </div>
        <div class="led" id="led2"></div>
        <div id="session-timer" style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.08em;min-width:36px;text-align:right;">0:00</div>
        <button class="cancel-btn" onclick="cancelSession()">✕ Annuler</button>
      </div>
      <div class="session-content" id="session-content"></div>
    </div>

  </div>
</div>

<script>
var SERVER='https://wan22-backend.fly.dev';

/* ── AUTH ── */
function doAuth(){
  var token=document.getElementById('tokenInput').value.trim();
  var err=document.getElementById('authError');
  if(!token){err.textContent='Token requis';return;}
  err.textContent='Vérification…';
  fetch(SERVER+'/food/ping',{headers:{'X-Api-Token':token}})
  .then(function(r){if(r.status===401||r.status===403)throw new Error('Token invalide');if(!r.ok)throw new Error('Erreur serveur');return r.json();})
  .then(function(){sessionStorage.setItem('food_token',token);localStorage.setItem('food_token',token);err.textContent='';showMain(token);})
  .catch(function(e){err.textContent=e.message||'Token invalide';});
}
function showMain(token){
  window._token=token;
  document.getElementById('page-auth').classList.add('hidden');
  document.getElementById('page-main').classList.remove('hidden');
  document.getElementById('led').classList.add('on');
  document.getElementById('led2').classList.add('on');
}
function doLogout(){
  sessionStorage.clear();localStorage.removeItem('food_token');
  resetState();
  document.getElementById('page-main').classList.add('hidden');
  document.getElementById('page-auth').classList.remove('hidden');
  document.getElementById('tokenInput').value='';
}
window.addEventListener('load',function(){
  var t=sessionStorage.getItem('food_token')||localStorage.getItem('food_token');
  if(t){document.getElementById('tokenInput').value=t;showMain(t);checkResumeSession();}
});

/* ── STATE ── */
var img64=null,imgMime='image/jpeg',selectedFormat='9:16';
var _styles=null,_styleIdx=-1,_angles=null;
var _hdBriefs=null,_montageBriefs=null;
var _hdResults=[null,null,null],_vidResults=[null,null,null];
var _aborted=false;
var _sessionStart=null,_timerInterval=null;
var _dishName=null,_sessionId=null;
var _runpodTimeMs=0;   // cumul temps jobs RunPod (images + vidéo)
var _runpodJobStart=null; // timestamp début job en cours

/* ── PERSISTANCE SESSION ── */
var SESSION_KEY='food_da_session';

function saveSession(extra){
  try{
    var state={
      version:1,
      timestamp:Date.now(),
      status:'active',
      img64:img64,
      imgMime:imgMime,
      styles:_styles,
      styleIdx:_styleIdx,
      hdBriefs:_hdBriefs,
      montageBriefs:_montageBriefs,
      hdResults:_hdResults,
      sessionStart:_sessionStart
    };
    if(extra)Object.assign(state,extra);
    localStorage.setItem(SESSION_KEY,JSON.stringify(state));
  }catch(e){console.warn('saveSession:',e);}
}

function clearSession(){
  localStorage.removeItem(SESSION_KEY);
}

function markSessionComplete(){
  try{
    var s=JSON.parse(localStorage.getItem(SESSION_KEY)||'{}');
    s.status='completed';
    s.completedAt=Date.now();
    localStorage.setItem(SESSION_KEY,JSON.stringify(s));
  }catch(e){}
}

function loadSession(){
  try{
    var s=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
    if(!s||s.status==='completed')return null;
    // Expirer après 2h
    if(Date.now()-s.timestamp>2*60*60*1000){clearSession();return null;}
    return s;
  }catch(e){return null;}
}

function checkResumeSession(){
  var s=loadSession();
  if(!s||!s.img64)return;
  // Afficher bannière de reprise
  var banner=document.createElement('div');
  banner.id='resume-banner';
  banner.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:500;background:#0d1e2e;border-top:1px solid var(--accent-dim);padding:16px;display:flex;flex-direction:column;gap:10px;';
  var d=new Date(s.timestamp);
  var dateStr=(d.getDate()<10?'0':'')+d.getDate()+'/'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+' '+d.getHours()+'h'+(d.getMinutes()<10?'0':'')+d.getMinutes();
  banner.innerHTML='<div style="font-family:\'Cormorant Garamond\',serif;font-size:15px;color:var(--accent);">Session en cours</div>'+
    '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.1em;">Démarrée le '+dateStr+'</div>'+
    '<div style="display:flex;gap:8px;">'+
    '<button onclick="resumeSession()" style="flex:1;background:var(--accent);color:#0f1c28;border:none;padding:12px;font-family:\'DM Sans\',sans-serif;font-size:12px;font-weight:500;cursor:pointer;">Reprendre</button>'+
    '<button onclick="discardSession()" style="flex:1;background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:12px;font-family:\'DM Mono\',monospace;font-size:9px;letter-spacing:.1em;cursor:pointer;">Nouvelle session</button>'+
    '</div>';
  document.body.appendChild(banner);
}

function discardSession(){
  clearSession();
  var b=document.getElementById('resume-banner');if(b)b.remove();
}

function resumeSession(){
  var b=document.getElementById('resume-banner');if(b)b.remove();
  var s=loadSession();
  if(!s||!s.img64)return;
  // Restaurer l'état
  img64=s.img64;imgMime=s.imgMime||'image/jpeg';
  _styles=s.styles;_styleIdx=s.styleIdx||-1;
  _hdBriefs=s.hdBriefs;_montageBriefs=s.montageBriefs;
  _hdResults=s.hdResults||[null,null,null];
  _sessionStart=s.sessionStart||Date.now();
  _aborted=false;
  // Afficher l'écran session
  document.getElementById('upload-screen').classList.add('hidden');
  document.getElementById('session-screen').classList.add('active');
  document.getElementById('session-thumb').src='data:image/jpeg;base64,'+img64;
  document.getElementById('session-content').innerHTML='';
  // Relancer le timer
  if(_timerInterval)clearInterval(_timerInterval);
  _timerInterval=setInterval(function(){
    if(!_sessionStart)return;
    var sec=Math.floor((Date.now()-_sessionStart)/1000);
    var m=Math.floor(sec/60);var ss=sec%60;
    var el=document.getElementById('session-timer');
    if(el)el.textContent=m+':'+(ss<10?'0':'')+ss;
  },1000);
  // Reprendre au bon endroit
  if(_styles){
    showStylePreviews(_styles);
    if(_styleIdx>=0){
      // Marquer le style sélectionné visuellement seulement
      setTimeout(function(){
        for(var i=0;i<_styles.length;i++){
          var c=document.getElementById('pc-'+i);if(!c)continue;
          c.classList.remove('selected','dimmed');
          if(i===_styleIdx)c.classList.add('selected');else c.classList.add('dimmed');
        }
        document.getElementById('session-sub').textContent='Choisissez une ambiance ou relancez';
      },300);
    }else{
      document.getElementById('session-sub').textContent='Choisissez une ambiance';
    }
  }else{
    // Reprendre depuis l'analyse
    var wrap=document.createElement('div');
    wrap.id='analyse-wrap';wrap.className='analyse-wrap';
    wrap.innerHTML='<div class="analyse-dots"><div class="analyse-dot"></div><div class="analyse-dot"></div><div class="analyse-dot"></div></div><div class="analyse-txt">Le DA analyse votre plat…</div>';
    document.getElementById('session-content').appendChild(wrap);
    callGeminiStyles();
  }
}


function tok(){return window._token||sessionStorage.getItem('food_token')||localStorage.getItem('food_token')||'';}

function resetState(){
  img64=null;imgMime='image/jpeg';
  _styles=null;_styleIdx=-1;_angles=null;
  _hdBriefs=null;_montageBriefs=null;
  _hdResults=[null,null,null];_vidResults=[null,null,null];
  _aborted=false;
  if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}_sessionStart=null;
  _dishName=null;_sessionId=null;
  _runpodTimeMs=0;_runpodJobStart=null;
  clearSession();
  document.getElementById('session-content').innerHTML='';
  document.getElementById('session-screen').classList.remove('active');
  document.getElementById('upload-screen').classList.remove('hidden');
  document.getElementById('dz').classList.remove('filled');
  document.getElementById('preview-photo').src='';
  document.getElementById('startBtn').disabled=true;
  ['camera','gallery','files'].forEach(function(s){document.getElementById('fi-'+s).value='';});
  document.getElementById('session-sub').textContent='Analyse en cours…';
}
function cancelSession(){_aborted=true;resetState();}

/* ── FORMAT ── */
function setFormat(fmt,btn){
  selectedFormat=fmt;
  document.querySelectorAll('.fmt-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var dz=document.getElementById('dz');
  dz.style.aspectRatio=fmt==='16:9'?'16/9':fmt==='1:1'?'1/1':'3/4';
}

/* ── BOTTOM SHEET ── */
function openSheet(){document.getElementById('sheetOverlay').classList.add('open');document.getElementById('bottomSheet').classList.add('open');}
function closeSheet(){document.getElementById('sheetOverlay').classList.remove('open');document.getElementById('bottomSheet').classList.remove('open');}
function triggerInput(src){closeSheet();setTimeout(function(){document.getElementById('fi-'+src).click();},200);}

/* ── UPLOAD & RESIZE ── */
function processImageFile(f){
  if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var maxW=720,maxH=1280;
      if(selectedFormat==='16:9'){maxW=1280;maxH=720;}
      else if(selectedFormat==='1:1'){maxW=1080;maxH=1080;}
      var ratio=Math.min(maxW/img.width,maxH/img.height,1);
      var tw=Math.round(img.width*ratio),th=Math.round(img.height*ratio);
      var canvas=document.createElement('canvas');
      canvas.width=tw;canvas.height=th;
      canvas.getContext('2d').drawImage(img,0,0,tw,th);
      var dataURL=canvas.toDataURL('image/jpeg',.88);
      img64=dataURL.split(',')[1];imgMime='image/jpeg';
      document.getElementById('dz').classList.add('filled');
      document.getElementById('preview-photo').src=dataURL;
      document.getElementById('startBtn').disabled=false;
      // Warm-up RunPod dès que l'image est prête
      fetch(SERVER+'/food/warmup',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Token':tok()}}).catch(function(){});
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
}
['camera','gallery','files'].forEach(function(s){
  document.getElementById('fi-'+s).addEventListener('change',function(e){processImageFile(e.target.files[0]);this.value='';});
});
var dz=document.getElementById('dz');
dz.addEventListener('dragover',function(e){e.preventDefault();});
dz.addEventListener('drop',function(e){e.preventDefault();var f=e.dataTransfer.files[0];if(f)processImageFile(f);});

/* ── START ── */
function startSession(){
  if(!img64)return;
  _aborted=false;
  document.getElementById('upload-screen').classList.add('hidden');
  document.getElementById('session-screen').classList.add('active');
  document.getElementById('session-thumb').src='data:image/jpeg;base64,'+img64;
  document.getElementById('session-content').innerHTML='';
  // Spinner analyse
  var sc=document.getElementById('session-content');
  var wrap=document.createElement('div');
  wrap.id='analyse-wrap';wrap.className='analyse-wrap';
  wrap.innerHTML='<div class="analyse-dots"><div class="analyse-dot"></div><div class="analyse-dot"></div><div class="analyse-dot"></div></div><div class="analyse-txt">Le DA analyse votre plat…</div>';
  sc.appendChild(wrap);
  _sessionStart=Date.now();
  if(_timerInterval)clearInterval(_timerInterval);
  _timerInterval=setInterval(function(){
    if(!_sessionStart)return;
    var s=Math.floor((Date.now()-_sessionStart)/1000);
    var m=Math.floor(s/60);var ss=s%60;
    var el=document.getElementById('session-timer');
    if(el)el.textContent=m+':'+(ss<10?'0':'')+ss;
  },1000);
  callGeminiStyles();
}

/* ── PHASE 1 : Gemini styles ── */
function callGeminiStyles(){
  dbg('info', 'img64 length: ' + (img64 ? img64.length : 'NULL') + ' mime: ' + imgMime);
  dbg('info', 'tok: ' + (tok()?'ok':'VIDE'));
  var history=[{role:'user',parts:[{inline_data:{mime_type:imgMime,data:img64}},{text:'Analyse ce plat et propose 4 ambiances visuelles différentes. Réponds uniquement avec le JSON phase 1a.'}]}];
  fetch(SERVER+'/food/da/chat',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Token':tok()},body:JSON.stringify({history:history})})
  .then(function(r){
    return r.json().then(function(d){
      if(!r.ok){throw new Error(d.detail||d.error||('Erreur '+r.status));}
      return d;
    });
  })
  .then(function(d){
    if(_aborted)return;
    var wrap=document.getElementById('analyse-wrap');if(wrap)wrap.remove();
    if(d.status!=='ok'||!d.brief){showError('Erreur analyse. Réessayez.',callGeminiStyles);return;}
    try{
      var c=d.brief.replace(/```json/gi,'').replace(/```/g,'').trim();
      c=c.slice(c.indexOf('{'));
      var b=JSON.parse(c);
      if(b.phase==='1a'&&b.styles&&b.styles.length>=3){
        _styles=b.styles;
        _hdBriefs=b.hd||null;
        _montageBriefs=b.montage||null;
        _dishName=b.dish_name||'Plat';
        // Générer session ID
        var now=new Date();
        var dd=String(now.getDate()).padStart(2,'0');
        var mm=String(now.getMonth()+1).padStart(2,'0');
        var yy=String(now.getFullYear()).slice(-2);
        var hh=String(now.getHours()).padStart(2,'0');
        var mn=String(now.getMinutes()).padStart(2,'0');
        var userSlug=(tok()||'user').replace(/[^a-zA-Z0-9]/g,'-').slice(0,12);
        _sessionId=userSlug+'-'+dd+'-'+mm+'-'+yy+'-'+hh+mn;
        saveSession();
        showStylePreviews(b.styles);
        return;
      }
    }catch(e){}
    showError('Réponse DA inattendue. Réessayez.',callGeminiStyles);
  })
  .catch(function(e){
    if(_aborted)return;
    var wrap=document.getElementById('analyse-wrap');if(wrap)wrap.remove();
    var msg=e.message||'';
    if(msg==='Load failed'||msg==='Failed to fetch'){setTimeout(callGeminiStyles,3000);return;}
    showError(msg||'Erreur réseau. Réessayez.',callGeminiStyles);
  });
}

/* ── Previews ── */
function showStylePreviews(styles){
  var sc=document.getElementById('session-content');
  var block=document.createElement('div');block.className='phase-block';block.id='phase-previews';
  var lbl=document.createElement('div');lbl.className='phase-label';lbl.textContent='Choisissez une ambiance';
  block.appendChild(lbl);
  var grid=document.createElement('div');grid.className='previews-grid';grid.id='previews-grid';
  styles.forEach(function(s,i){
    var card=document.createElement('div');card.className='preview-card no-ready';card.id='pc-'+i;
    card.innerHTML='<div class="pc-shimmer"><img class="pc-bg" src="data:image/jpeg;base64,'+img64+'"><div class="preview-scan"></div></div>'+
      '<div class="pc-label"><div class="pc-name">'+s.name+'</div></div>';
    card.addEventListener('click',function(){if(card.dataset.ready)selectStyle(i);});
    grid.appendChild(card);
  });
  block.appendChild(grid);
  sc.appendChild(block);
  sc.scrollTop=sc.scrollHeight;
  document.getElementById('session-sub').textContent='3 ambiances en cours…';
  genPreview(styles,0);
}

/* ── Style images mapping ── */
var STYLE_IMAGES_BASE='https://wan22-videos-chris.s3.eu-north-1.amazonaws.com/wan22-videos/food-da-styles/';
var STYLE_IMG_MAP={
  'GOLDEN HOUR WINDOW':'golden-hour-window.jpg',
  'PERFECTLY IMPERFECT':'perfectly-imperfect.jpg',
  'SOFT DAYLIGHT':'soft-daylight.jpg',
  'HUMAN TOUCH':'human-touch.jpg',
  'DARK MOODY LUXURY':'dark-moody-luxury.jpg',
  'CHIAROSCURO':'chiaroscuro.jpg',
  'WET & GLOSSY':'wet-glossy.jpg',
  'COLOUR BLOCKING':'colour-blocking.jpg',
  'VIBRANT CONTRAST':'vibrant-contrast.jpg',
  'MACRO MONDE':'macro-monde.jpg',
  'OVERHEAD FLAT LAY':'overhead-flat-lay.jpg',
  'RETRO FILM':'retro-film.jpg',
  'MINIMALIST STUDIO':'minimalist-studio.jpg',
  'NATURE TABLE':'nature-table.jpg',
  'STEAM & SMOKE':'steam-smoke.jpg',
  'AQUATIQUE FRAÎCHEUR':'aquatique-fraicheur.jpg',
  'SLOW POUR CINEMATIC':'slow-pour-cinematic.jpg',
  'DRESSAGE EN DIRECT':'dressage-en-direct.jpg'
};
function getStyleImage(name){
  var key=Object.keys(STYLE_IMG_MAP).find(function(k){return name.toUpperCase().indexOf(k)>=0||k.indexOf(name.toUpperCase())>=0;});
  return key?STYLE_IMAGES_BASE+STYLE_IMG_MAP[key]:null;
}

function genPreview(styles,idx){
  if(_aborted||idx>=styles.length)return;
  var card=document.getElementById('pc-'+idx),st=document.getElementById('pc-st-'+idx);
  var imgUrl=getStyleImage(styles[idx].name);
  if(imgUrl){
    var img=document.createElement('img');
    img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';
    img.onload=function(){
      var shimmer=card.querySelector('.pc-shimmer');if(shimmer)shimmer.replaceWith(img);
      if(st)st.style.display='none';
      card.dataset.ready='1';card.classList.remove('no-ready');
      genPreview(styles,idx+1);
    };
    img.onerror=function(){
      // Fallback si image pas encore uploadée
      card.dataset.ready='1';card.classList.remove('no-ready');
      if(st)st.textContent='';
      genPreview(styles,idx+1);
    };
    img.src=imgUrl;
  }else{
    // Style non mappé — card cliquable avec shimmer
    card.dataset.ready='1';card.classList.remove('no-ready');
    if(st)st.textContent='';
    genPreview(styles,idx+1);
  }
}

function selectStyle(idx){
  _styleIdx=idx;
  for(var i=0;i<_styles.length;i++){
    var c=document.getElementById('pc-'+i);if(!c)continue;
    c.classList.remove('selected','dimmed');
    if(i===idx)c.classList.add('selected');else c.classList.add('dimmed');
  }
  document.getElementById('session-sub').textContent='Production en cours…';
  saveSession({styleIdx:idx});
  initProdSection('Génération image HD…');

  // Si on a déjà les briefs (reprise de session)
  if(_hdBriefs&&_hdBriefs[idx]){
    launchHD(_hdBriefs[idx]);
    return;
  }

  var s=_styles[idx];
  var history=[
    {role:'user',parts:[{inline_data:{mime_type:imgMime,data:img64}},{text:'Voici mon produit.'}]},
    {role:'model',parts:[{text:'J\'ai analysé votre plat et proposé ces styles : '+_styles.map(function(st){return st.name;}).join(', ')+'.'}]},
    {role:'user',parts:[{text:'Je choisis le style "'+s.name+'". Génère 1 prompt image HD et 1 prompt vidéo. JSON avec "hd":{mode:"single",prompt:"..."} et "video":{prompt:"..."}.'}]}
  ];
  fetch(SERVER+'/food/da/chat',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Token':tok()},body:JSON.stringify({history:history})})
  .then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.detail||d.error||('Erreur '+r.status));return d;});})
  .then(function(d){
    if(_aborted)return;
    if(d.status==='ok'&&d.brief){
      try{
        var c=d.brief.replace(/```json/gi,'').replace(/```/g,'').trim();
        c=c.slice(c.indexOf('{'));
        var b=JSON.parse(c);
        var hd=b.hd||{mode:'single',prompt:s.prompt};
        var video=b.video||{prompt:'cinematic slow zoom, food commercial'};
        if(!_hdBriefs)_hdBriefs=[];
        if(!_montageBriefs)_montageBriefs=[];
        _hdBriefs[idx]=hd;
        _montageBriefs[idx]=video;
        saveSession({hdBriefs:_hdBriefs,montageBriefs:_montageBriefs});
        launchHD(hd);
        return;
      }catch(e){}
    }
    launchHD({mode:'single',prompt:s.prompt});
  })
  .catch(function(e){
    if(_aborted)return;
    var msg=e.message||'';
    if(msg==='Load failed'||msg==='Failed to fetch'){setTimeout(function(){selectStyle(idx);},3000);return;}
    showProdError(msg||'Erreur réseau.',function(){selectStyle(idx);});
  });
}

/* ── Init section production ── */
function initProdSection(txt){
  var sc=document.getElementById('session-content');
  var old=document.getElementById('phase-prod');if(old)old.remove();
  var block=document.createElement('div');block.className='phase-block';block.id='phase-prod';
  // Progress 2 étapes
  var pw=document.createElement('div');pw.className='progress-bar-wrap';
  var ps=document.createElement('div');ps.className='progress-steps';
  ['Image HD','Vidéo'].forEach(function(s,i){
    var el=document.createElement('div');el.id='prog-'+i;
    el.className='progress-step'+(i===0?' active':'');ps.appendChild(el);
  });
  var pt=document.createElement('div');pt.className='progress-txt';pt.id='prog-txt';pt.textContent=txt;
  pw.appendChild(ps);pw.appendChild(pt);block.appendChild(pw);
  // 1 seule card HD
  var hdlbl=document.createElement('div');hdlbl.className='sub-lbl';hdlbl.textContent='Image HD';block.appendChild(hdlbl);
  var card=document.createElement('div');card.className='prod-card';card.id='hd-card-0';
  card.style.cssText='width:100%;max-width:100%;aspect-ratio:9/16;scroll-snap-align:none;';
  card.innerHTML='<img class="pc-bg" src="data:image/jpeg;base64,'+img64+'" style="filter:blur(8px) brightness(.4);width:100%;height:100%;object-fit:cover;">'+
    '<div class="preview-scan"></div><div class="prod-card-label" id="hd-lbl-0">Génération…</div>';
  block.appendChild(card);
  sc.appendChild(block);sc.scrollTop=sc.scrollHeight;
}

function setProgress(step,txt){
  for(var i=0;i<2;i++){
    var el=document.getElementById('prog-'+i);if(!el)continue;
    el.className='progress-step';
    if(step<0)el.classList.add('done');
    else if(i<step)el.classList.add('done');
    else if(i===step)el.classList.add('active');
  }
  var t=document.getElementById('prog-txt');if(t)t.textContent=txt;
}

function showProdError(msg,retry){
  var t=document.getElementById('prog-txt');if(t)t.textContent=msg;
  var block=document.getElementById('phase-prod');if(!block)return;
  var old=block.querySelector('.retry-btn');if(old)old.remove();
  var btn=document.createElement('button');btn.className='secondary-btn retry-btn';btn.textContent='↺ Réessayer';
  btn.onclick=function(){btn.remove();retry();};block.appendChild(btn);
}

/* ── Génération HD (1 seule image) ── */
function launchHD(brief){
  setProgress(0,'Génération image HD…');
  _runpodJobStart=Date.now();
  var prompt=brief.prompt||brief.prompt_1||'';

  fetch(SERVER+'/food/generate_batch',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Token':tok()},
    body:JSON.stringify({image:img64,prompts:[prompt],angles:[0],mode:brief.mode||'single',session_id:_sessionId,dish_name:_dishName})})
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(function(d){
    if(_aborted)return;
    if(d.status==='queued'&&d.job_id){pollHD(d.job_id,0);}
    else{setProgress(0,'Erreur lancement HD');}
  })
  .catch(function(e){if(!_aborted)setProgress(0,'Erreur réseau: '+(e.message||''));});
}

function pollHD(jobId,attempt){
  if(attempt>80){setProgress(0,'Timeout HD');return;}
  setTimeout(function(){
    if(_aborted)return;
    fetch(SERVER+'/food/batch_result',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Token':tok()},body:JSON.stringify({job_id:jobId})})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){
      if(_aborted)return;
      if(d.status==='ok'&&d.images&&d.images[0]){
        if(_runpodJobStart){_runpodTimeMs+=Date.now()-_runpodJobStart;_runpodJobStart=null;}
        var img=d.images[0];
        _hdResults[0]=img.image_url||img.image;
        var card=document.getElementById('hd-card-0');
        if(card){
          var src=img.image_url?img.image_url:(img.image?'data:image/png;base64,'+img.image:'');
          card.innerHTML='<img src="'+src+'" style="width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in;" onclick="openLightbox(\''+src+'\')">'+
            '<div class="prod-card-label">Image HD — tap pour agrandir</div>'+
            (img.image_url?'<a href="'+img.image_url+'" download="image_hd.png" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:var(--accent);font-family:\'DM Mono\',monospace;font-size:9px;padding:3px 7px;text-decoration:none;">↓</a>':'');
        }
        saveSession({hdResults:_hdResults});
        setProgress(1,'Génération vidéo…');
        addVidCard();
        launchVideo();
      }else if(d.status==='processing'){
        setProgress(0,'Image HD… '+(attempt*8)+'s');
        pollHD(jobId,attempt+1);
      }else{
        setProgress(0,'Erreur HD: '+(d.error||''));
      }
    })
    .catch(function(){if(!_aborted)pollHD(jobId,attempt+1);});
  },attempt===0?5000:8000);
}

/* ── 1 seule card vidéo ── */
function addVidCard(){
  var block=document.getElementById('phase-prod');if(!block)return;
  var lbl=document.createElement('div');lbl.className='sub-lbl';lbl.style.marginTop='8px';lbl.textContent='Vidéo';block.appendChild(lbl);
  var card=document.createElement('div');card.className='prod-card';card.id='vid-card-0';
  card.style.cssText='width:100%;max-width:100%;aspect-ratio:9/16;scroll-snap-align:none;';
  var bg=_hdResults[0]||img64;
  var bgSrc=bg.startsWith('http')?bg:'data:image/jpeg;base64,'+bg;
  card.innerHTML='<img class="pc-bg" src="'+bgSrc+'" style="filter:blur(6px) brightness(.45);width:100%;height:100%;object-fit:cover;">'+
    '<div class="preview-scan"></div><div class="prod-card-label" id="vid-lbl-0">Génération…</div>';
  block.appendChild(card);
  var sc=document.getElementById('session-content');sc.scrollTop=sc.scrollHeight;
}

/* ── Lancement vidéo ── */
function launchVideo(){
  var videoPrompt='cinematic slow zoom, warm golden light, food commercial';
  if(_montageBriefs&&_montageBriefs[_styleIdx]){
    var mb=_montageBriefs[_styleIdx];
    videoPrompt=mb.prompt||mb.clips&&mb.clips[0]&&mb.clips[0].prompt||videoPrompt;
  }
  // Utiliser l'image HD (URL S3 ou b64)
  var frame=_hdResults[0]||img64;
  var frameIsUrl=frame&&frame.startsWith('http');

  _runpodJobStart=Date.now();
  fetch(SERVER+'/food/generate_video',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Token':tok()},
    body:JSON.stringify({
      frames:[frameIsUrl?'':frame],
      frame_urls:frameIsUrl?[frame]:[],
      prompts:[videoPrompt],
      prompt:videoPrompt,
      length:81,width:480,height:854,
      session_id:_sessionId,dish_name:_dishName
    })})
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(function(d){
    if(_aborted)return;
    if(d.status==='queued'&&d.job_id){pollVideo(d.job_id,0);}
    else{setProgress(1,'Erreur lancement vidéo');}
  })
  .catch(function(e){if(!_aborted)setProgress(1,'Erreur: '+(e.message||''));});
}

function pollVideo(jobId,attempt){
  if(attempt>120){setProgress(1,'Timeout vidéo');return;}
  setProgress(1,'Vidéo… '+(attempt*8)+'s');
  setTimeout(function(){
    if(_aborted)return;
    fetch(SERVER+'/food/video_result',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Token':tok()},body:JSON.stringify({job_id:jobId})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(_aborted)return;
      if(d.status==='ok'){
        if(_runpodJobStart){_runpodTimeMs+=Date.now()-_runpodJobStart;_runpodJobStart=null;}
        // Récupérer l'URL vidéo
        var videoUrl=d.video_url||(d.clip_urls&&d.clip_urls[0])||null;
        var videoB64=d.video||null;
        // Afficher dans la card
        var card=document.getElementById('vid-card-0');
        if(card&&videoUrl){
          card.innerHTML='<video autoplay loop muted playsinline style="width:100%;height:100%;object-fit:cover;"><source src="'+videoUrl+'" type="video/mp4"></video>'+
            '<div class="prod-card-label">Vidéo ✓</div>'+
            '<a href="'+videoUrl+'" download="video.mp4" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:var(--accent);font-family:\'DM Mono\',monospace;font-size:9px;padding:3px 7px;text-decoration:none;">↓</a>';
        }
        showFinalResult(videoB64, videoUrl);
      }else if(d.status==='processing'){
        pollVideo(jobId,attempt+1);
      }else{
        setProgress(1,'Erreur: '+(d.error||''));
      }
    })
    .catch(function(){if(!_aborted)pollVideo(jobId,attempt+1);});
  },attempt===0?5000:8000);
}

function showFinalResult(videoB64, videoUrl){
  setProgress(-1,'Terminé ✓');
  var sc=document.getElementById('session-content');
  var old=document.getElementById('phase-final');if(old)old.remove();
  var block=document.createElement('div');block.className='phase-block';block.id='phase-final';
  var lbl=document.createElement('div');lbl.className='phase-label';lbl.textContent='Résultat final';block.appendChild(lbl);

  // Vidéo — URL S3 directe prioritaire (fix fetch error)
  var src=videoUrl||(videoB64?'data:video/mp4;base64,'+videoB64:null);
  if(src){
    var vid=document.createElement('video');
    vid.controls=true;vid.autoplay=true;vid.loop=true;vid.setAttribute('playsinline','');
    vid.style.cssText='width:100%;display:block;border:1px solid var(--accent-dim);';
    vid.innerHTML='<source src="'+src+'" type="video/mp4">';
    block.appendChild(vid);
    if(videoUrl){
      var dl=document.createElement('a');dl.href=videoUrl;dl.download='video_final.mp4';
      dl.className='final-btn';dl.style.marginTop='8px';dl.textContent='↓ Télécharger la vidéo';
      block.appendChild(dl);
    }
  }

  // Feedback 👍/👎
  var fbWrap=document.createElement('div');
  fbWrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 0 8px;';
  var fbLbl=document.createElement('div');
  fbLbl.style.cssText='font-family:\'DM Mono\',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);';
  fbLbl.textContent='Cette génération vous convient ?';
  fbWrap.appendChild(fbLbl);
  var fbBtns=document.createElement('div');fbBtns.style.cssText='display:flex;gap:16px;';
  var btnUp=document.createElement('button');
  btnUp.style.cssText='font-size:28px;background:transparent;border:1px solid var(--border);width:56px;height:56px;cursor:pointer;transition:border-color .2s,transform .15s;border-radius:8px;';
  btnUp.textContent='👍';
  btnUp.onclick=function(){sendFeedback('up',btnUp,btnDown);};
  var btnDown=document.createElement('button');
  btnDown.style.cssText='font-size:28px;background:transparent;border:1px solid var(--border);width:56px;height:56px;cursor:pointer;transition:border-color .2s,transform .15s;border-radius:8px;';
  btnDown.textContent='👎';
  btnDown.onclick=function(){sendFeedback('down',btnDown,btnUp);};
  fbBtns.appendChild(btnUp);fbBtns.appendChild(btnDown);
  fbWrap.appendChild(fbBtns);
  var fbStatus=document.createElement('div');fbStatus.id='fb-status';
  fbStatus.style.cssText='font-family:\'DM Mono\',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.08em;min-height:14px;';
  fbWrap.appendChild(fbStatus);
  block.appendChild(fbWrap);

  var chg=document.createElement('button');chg.className='secondary-btn';chg.textContent='✦ Changer d\'ambiance';
  chg.onclick=changeAmbiance;block.appendChild(chg);
  var nw=document.createElement('button');nw.className='secondary-btn';nw.textContent='↺ Nouveau produit';
  nw.onclick=resetState;block.appendChild(nw);
  sc.appendChild(block);
  document.getElementById('session-sub').textContent='Terminé ✓';
  markSessionComplete();
  if(navigator.vibrate)navigator.vibrate([200,100,200]);
  sc.scrollTop=sc.scrollHeight;
}

/* ── Lightbox ── */
var _isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
function openLightbox(src){
  var lb=document.getElementById('lightbox');
  var img=document.getElementById('lb-img');
  var dl=document.getElementById('lb-dl');
  var hint=document.getElementById('lb-ios-hint');
  img.src=src;
  dl.href=src;
  if(_isIOS&&src.startsWith('http')){
    hint.style.display='block';
    dl.style.display='none';
  }else{
    hint.style.display='none';
    dl.style.display='flex';
  }
  lb.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(e){
  if(e&&e.target!==document.getElementById('lightbox'))return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}

function sendFeedback(rating, btnActive, btnOther){
  btnActive.style.borderColor='var(--accent)';
  btnActive.style.transform='scale(1.15)';
  btnOther.disabled=true;btnOther.style.opacity='.3';
  btnActive.disabled=true;
  var status=document.getElementById('fb-status');
  if(status)status.textContent='Envoi…';
  var totalSec=_sessionStart?Math.floor((Date.now()-_sessionStart)/1000):null;
  var runpodSec=Math.round(_runpodTimeMs/1000)||null;
  var styleName=(_styles&&_styleIdx>=0&&_styles[_styleIdx])?_styles[_styleIdx].name:'';
  fetch(SERVER+'/food/feedback',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-Api-Token':tok()},
    body:JSON.stringify({
      session_id:_sessionId||'unknown',
      rating:rating,
      dish_name:_dishName||'',
      style_name:styleName,
      total_time_seconds:totalSec,
      runpod_time_seconds:runpodSec
    })
  })
  .then(function(r){return r.json();})
  .then(function(){if(status)status.textContent='Merci pour votre retour ✓';})
  .catch(function(){if(status)status.textContent='Envoi échoué — réessayez';btnActive.disabled=false;});
}

function changeAmbiance(){
  _styleIdx=-1;_hdResults=[null,null,null];_vidResults=[null,null,null];_aborted=false;
  _runpodTimeMs=0;_runpodJobStart=null;
  var p=document.getElementById('phase-prod');if(p)p.remove();
  var f=document.getElementById('phase-final');if(f)f.remove();
  for(var i=0;i<4;i++){var c=document.getElementById('pc-'+i);if(c)c.classList.remove('selected','dimmed');}
  document.getElementById('session-sub').textContent='Choisissez une ambiance';
  document.getElementById('session-content').scrollTop=0;
}

/* ── Helpers ── */
function showError(msg,retry){
  var sc=document.getElementById('session-content');
  var div=document.createElement('div');div.style.cssText='display:flex;flex-direction:column;gap:8px;';
  var err=document.createElement('div');err.className='err-msg';err.textContent=msg;div.appendChild(err);
  if(retry){var btn=document.createElement('button');btn.className='secondary-btn';btn.textContent='↺ Réessayer';btn.onclick=function(){div.remove();retry();};div.appendChild(btn);}
  sc.appendChild(div);
}

function b64toBlob(b64,mime){
  try{
    var bytes=atob(b64),arr=new Uint8Array(bytes.length);
    for(var j=0;j<bytes.length;j++)arr[j]=bytes.charCodeAt(j);
    return URL.createObjectURL(new Blob([arr],{type:mime}));
  }catch(e){return 'data:'+mime+';base64,'+b64;}
}

function pollImage(jobId,attempt,onDone){
  if(attempt>40){onDone(null,'Timeout');return;}
  setTimeout(function(){
    if(_aborted)return;
    fetch(SERVER+'/food/image_result',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Token':tok()},body:JSON.stringify({job_id:jobId})})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){
      if(_aborted)return;
      if(d.status==='ok'&&d.image)onDone(d.image,null);
      else if(d.status==='processing')pollImage(jobId,attempt+1,onDone);
      else onDone(null,d.error||'Erreur RunPod');
    })
    .catch(function(){if(!_aborted)pollImage(jobId,attempt+1,onDone);});
  },attempt===0?3000:8000);
}

</div>

<script>
var _debugOpen=false;
function toggleDebug(){_debugOpen=!_debugOpen;document.getElementById('debug-panel').classList.toggle('open',_debugOpen);}

function dbg(type,msg){
  var el=document.createElement('div');el.className='dbg-entry '+type;
  var t=new Date().toTimeString().slice(0,8);
  el.textContent='['+t+'] '+msg;
  var log=document.getElementById('debug-log');
  log.appendChild(el);log.scrollTop=log.scrollHeight;
}

// Patch fetch global pour logger toutes les requêtes
var _origFetch=window.fetch;
window.fetch=function(url,opts){
  var method=(opts&&opts.method)||'GET';
  var shortUrl=url.replace('https://wan22-backend.fly.dev','');
  dbg('req','→ '+method+' '+shortUrl);
  var bodyStr='';
  if(opts&&opts.body){try{var b=JSON.parse(opts.body);var keys=Object.keys(b);bodyStr=' {'+keys.map(function(k){var v=b[k];return k+':'+(typeof v==='string'&&v.length>30?v.slice(0,30)+'…':JSON.stringify(v));}).join(', ')+'}';}catch(e){}}
  if(bodyStr)dbg('info','  payload'+bodyStr);
  return _origFetch.apply(this,arguments).then(function(r){
    var clone=r.clone();
    clone.json().then(function(d){
      var preview=JSON.stringify(d).slice(0,120);
      dbg(r.ok?'res-ok':'res-err','← '+r.status+' '+preview);
    }).catch(function(){dbg('res-err','← '+r.status+' (non-JSON)');});
    return r;
  }).catch(function(e){
    dbg('res-err','✗ FETCH ERROR: '+e.message);
    throw e;
  });
};
