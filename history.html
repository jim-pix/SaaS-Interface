<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyAI — Mes vidéos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1a;
    --surface: rgba(8, 16, 35, 0.82);
    --border: rgba(100, 160, 255, 0.15);
    --text: #e8f0ff;
    --muted: #7a9acc;
    --action: #3a3f4a;
    --action-hover: #4a5060;
    --blue: #60a8ff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    background-image: url('Gemini_Generated_Image_ctmtkyctmtkyctmt.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── NAV HEADER ── */
  .nav-header { width:100%; max-width:680px; padding:12px 16px; display:flex; align-items:center; gap:6px; background:rgba(8,16,35,0.82); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid rgba(100,160,255,0.12); position:sticky; top:0; z-index:10; }
  .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1em; letter-spacing:-0.5px; color:#fff; text-decoration:none; margin-right:auto; }
  .nav-logo span { color: #60a8ff; }
  .nav-btn { display:flex; align-items:center; gap:5px; padding:6px 11px; border-radius:20px; border:1px solid rgba(100,160,255,0.15); background:rgba(100,160,255,0.06); color:#7a9acc; font-size:0.72em; font-family:'Syne',sans-serif; font-weight:700; cursor:pointer; text-decoration:none; transition:all 0.2s; white-space:nowrap; }
  .nav-btn:hover { border-color:rgba(100,160,255,0.35); color:#c0d8ff; }
  .nav-btn.active { background:rgba(96,168,255,0.15); border-color:rgba(96,168,255,0.35); color:#60a8ff; }
  .nav-btn.nav-generating { background:rgba(255,180,60,0.1); border-color:rgba(255,180,60,0.3); color:#ffb43c; }
  .nav-btn.nav-hidden { display:none; }
  .nav-dot { width:6px; height:6px; border-radius:50%; background:#ffb43c; animation:navpulse 1.2s ease-in-out infinite; flex-shrink:0; }
  @keyframes navpulse { 0%,100%{opacity:0.4;transform:scale(0.8);} 50%{opacity:1;transform:scale(1.2);} }

  /* ── MAIN ── */
  .main {
    width: 100%;
    max-width: 680px;
    padding: 24px 20px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── STATS ── */
  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: rgba(8, 16, 35, 0.6);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 0.8em;
    color: var(--muted);
  }

  .stats-bar span { font-family: 'DM Mono', monospace; color: var(--blue); }

  /* ── GRILLE VIDÉOS ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .video-card {
    background: rgba(8, 16, 35, 0.75);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  .video-card:hover { border-color: rgba(100,160,255,0.35); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:none; }
  }

  .video-thumb {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #060c1a;
    cursor: pointer;
    overflow: hidden;
  }

  .video-thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .video-thumb .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(5,10,25,0.3);
    opacity: 1;
    transition: opacity 0.2s;
  }
  .video-thumb:hover .play-overlay { opacity: 0; }

  .play-icon {
    width: 36px; height: 36px;
    background: rgba(8,16,35,0.7);
    border: 1px solid rgba(100,160,255,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9em;
    backdrop-filter: blur(8px);
  }

  .video-expired {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2a3a5a;
    font-size: 0.75em;
    font-family: 'Syne', sans-serif;
  }

  .video-info {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .video-prompt {
    font-size: 0.76em;
    color: var(--text);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .video-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }

  .video-date {
    font-size: 0.68em;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .dl-btn {
    width: 28px; height: 28px;
    background: var(--action);
    border: none;
    border-radius: 8px;
    color: var(--text);
    font-size: 0.8em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .dl-btn:hover { background: var(--action-hover); }
  .dl-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── PAGINATION ── */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 4px;
  }

  .page-btn {
    padding: 8px 16px;
    background: rgba(8,16,35,0.7);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.78em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .page-btn:hover:not(:disabled) { border-color: rgba(100,160,255,0.4); color: var(--blue); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  .page-info {
    font-size: 0.78em;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── EMPTY / LOADING ── */
  .empty-state {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }
  .empty-state.visible { display: flex; }
  .empty-icon { font-size: 2.5em; opacity: 0.4; }
  .empty-text { font-size: 0.9em; line-height: 1.6; }

  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 40px;
    color: var(--muted);
    font-size: 0.85em;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(100,160,255,0.2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── NEW BTN ── */
  .new-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.88em;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: block;
    text-align: center;
    margin-top: 4px;
  }
  .new-btn:hover { border-color: rgba(100,160,255,0.4); color: var(--blue); }
</style>
</head>
<body>

<div class="nav-header">
  <a href="index.html" class="nav-logo">Easy<span>AI</span></a>
  <a href="index.html" class="nav-btn">Accueil</a>
  <a href="history.html" class="nav-btn active">Vidéos</a>
  <a href="generation.html" class="nav-btn nav-generating nav-hidden" id="navGenerating">
    <div class="nav-dot"></div>En cours
  </a>
</div>

<div class="main">

  <!-- Stats -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <span>Vidéos générées</span>
    <span id="totalCount">0</span>
  </div>

  <!-- Loading -->
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    Chargement de tes vidéos...
  </div>

  <!-- Empty -->
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🎬</div>
    <div class="empty-text">Aucune vidéo générée pour le moment.<br>Lance une création depuis le chat !</div>
  </div>

  <!-- Grille -->
  <div class="grid" id="videoGrid"></div>

  <!-- Pagination -->
  <div class="pagination" id="pagination" style="display:none">
    <button class="page-btn" id="prevBtn" onclick="loadPage(currentPage-1)" disabled>← Préc.</button>
    <span class="page-info" id="pageInfo">1 / 1</span>
    <button class="page-btn" id="nextBtn" onclick="loadPage(currentPage+1)" disabled>Suiv. →</button>
  </div>

  <!-- Nouvelle création -->
  <a href="index.html" class="new-btn">✦ Créer une nouvelle vidéo</a>

</div>

<script>
const BACKEND_URL = 'https://wan22-backend.fly.dev';
const apiToken    = localStorage.getItem('easyai_token') || '';

if (!apiToken) { location.href = 'index.html'; }

// Afficher "En cours" uniquement si job encore actif sur RunPod
const activeJobId = localStorage.getItem('easyai_job_id');
if (activeJobId) {
  fetch(`${BACKEND_URL}/status/${activeJobId}`, { headers: { 'X-Api-Token': apiToken } })
    .then(r => r.json())
    .then(data => {
      const active = ['IN_QUEUE','IN_PROGRESS'].includes(data.status);
      if (!active) localStorage.removeItem('easyai_job_id');
      const btn = document.getElementById('navGenerating');
      if (btn && active) btn.classList.remove('nav-hidden');
    })
    .catch(() => {});
}

let currentPage   = 1;
let totalPages    = 1;
let totalCount    = 0;

async function loadPage(page) {
  if (page < 1 || page > totalPages) return;
  currentPage = page;

  document.getElementById('loadingState').style.display = 'flex';
  document.getElementById('videoGrid').innerHTML = '';
  document.getElementById('pagination').style.display = 'none';
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('emptyState').classList.remove('visible');

  try {
    const res = await fetch(`${BACKEND_URL}/my-generations?page=${page}`, {
      headers: { 'X-Api-Token': apiToken }
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    document.getElementById('loadingState').style.display = 'none';

    const generations = data.generations || data.items || data || [];
    totalPages  = data.total_pages || data.pages || 1;
    totalCount  = data.total || generations.length;

    if (!generations.length) {
      document.getElementById('emptyState').classList.add('visible');
      return;
    }

    // Stats
    document.getElementById('totalCount').textContent = totalCount;
    document.getElementById('statsBar').style.display = 'flex';

    // Grille
    const grid = document.getElementById('videoGrid');
    generations.forEach((gen, i) => {
      const card = buildCard(gen, i);
      grid.appendChild(card);
    });

    // Pagination
    if (totalPages > 1) {
      document.getElementById('pagination').style.display = 'flex';
      document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
      document.getElementById('prevBtn').disabled = currentPage <= 1;
      document.getElementById('nextBtn').disabled = currentPage >= totalPages;
    }

  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('emptyState').classList.add('visible');
    document.getElementById('emptyState').querySelector('.empty-text').textContent =
      `Erreur de chargement : ${e.message}`;
    console.error(e);
  }
}

function buildCard(gen, index) {
  const card = document.createElement('div');
  card.className = 'video-card';
  card.style.animationDelay = (index * 0.06) + 's';

  const date = gen.created_at
    ? new Date(gen.created_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'2-digit' })
    : '—';

  const hasVideo = !!gen.video_url;
  const prompt   = gen.user_prompt || gen.prompt || '';
  const jobId    = gen.job_id || '';

  const thumbHtml = hasVideo
    ? `<video src="${gen.video_url}" muted loop playsinline
         onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0">
       </video>
       <div class="play-overlay"><div class="play-icon">▶</div></div>`
    : `<div class="video-expired">Expirée</div>`;

  card.innerHTML = `
    <div class="video-thumb" onclick="openVideo('${gen.video_url || ''}')">
      ${thumbHtml}
    </div>
    <div class="video-info">
      <div class="video-prompt">${prompt || 'Sans description'}</div>
      <div class="video-meta">
        <span class="video-date">${date}</span>
        <button class="dl-btn" ${!hasVideo ? 'disabled' : ''}
          onclick="event.stopPropagation(); dlVideo('${gen.video_url || ''}','${jobId}')"
          title="Télécharger">📥</button>
      </div>
    </div>
  `;

  return card;
}

function openVideo(url) {
  if (!url) return;
  window.open(url, '_blank');
}

async function dlVideo(url, jobId) {
  if (!url) return;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  if (jobId) {
    const dlUrl = `${BACKEND_URL}/download/${jobId}?token=${encodeURIComponent(apiToken)}`;
    if (isIOS && navigator.share) {
      try { await navigator.share({ title: 'Ma vidéo EasyAI', url: dlUrl }); return; }
      catch(e) { if (e.name === 'AbortError') return; }
    }
    if (isIOS) { window.location.href = dlUrl; return; }
    const a = document.createElement('a');
    a.href = dlUrl;
    a.download = `easyai_${jobId.slice(0,8)}.mp4`;
    a.click();
  } else {
    window.open(url, '_blank');
  }
}

// Init
loadPage(1);
</script>
</body>
</html>
