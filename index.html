<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wan 2.2 Video Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 1.1em;
        }

        select, input[type="text"], input[type="range"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        select:focus, input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .radio-option label {
            display: block;
            padding: 15px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .radio-option input[type="radio"]:checked + label {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .file-upload {
            position: relative;
            overflow: hidden;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-label {
            display: block;
            padding: 20px;
            background: #f5f5f5;
            border: 2px dashed #667eea;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload-label:hover {
            background: #e8eaf6;
            border-color: #5568d3;
        }

        .file-upload-label.has-file {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 300px;
            margin-top: 15px;
            border-radius: 8px;
            display: none;
        }

        .slider-container {
            margin-top: 10px;
        }

        .slider-value {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 10px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            height: 8px;
            background: #e0e0e0;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Progress section */
        .progress-section {
            margin-top: 30px;
            display: none;
        }

        .progress-section.active {
            display: block;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .progress-status {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
        }

        .progress-time {
            font-size: 0.9em;
            color: #666;
        }

        .progress-bar-container {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        /* Logs section */
        .logs-section {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .log-entry {
            color: #d4d4d4;
            margin: 5px 0;
            padding: 3px 0;
            border-left: 3px solid transparent;
            padding-left: 10px;
        }

        .log-entry.info {
            border-color: #4caf50;
            color: #a5d6a7;
        }

        .log-entry.warning {
            border-color: #ff9800;
            color: #ffb74d;
        }

        .log-entry.error {
            border-color: #f44336;
            color: #e57373;
        }

        .log-entry.success {
            border-color: #00bcd4;
            color: #80deea;
            font-weight: bold;
        }

        /* Video result */
        .video-result {
            margin-top: 30px;
            text-align: center;
            display: none;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .video-result.active {
            display: block;
        }

        .video-result h3 {
            color: #4caf50;
            margin-bottom: 20px;
        }

        .video-result video {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #4caf50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #45a049;
        }

        .info-box {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .info-box p {
            color: #2e7d32;
            margin: 5px 0;
        }

        /* Scrollbar personnalisé pour les logs */
        .logs-section::-webkit-scrollbar {
            width: 8px;
        }

        .logs-section::-webkit-scrollbar-track {
            background: #2d2d2d;
        }

        .logs-section::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 Wan 2.2 Generator</h1>
        <p class="subtitle">Créez des vidéos à partir de vos images</p>

        <div class="info-box">
            <p><strong>ℹ️ Information</strong></p>
            <p>Configuration RunPod requise : GPU avec 24GB+ VRAM (RTX 4090, A100)</p>
        </div>

        <form id="videoForm">
            <!-- Type de workflow -->
            <div class="form-group">
                <label for="workflowType">Type d'animation</label>
                <select id="workflowType" required>
                    <option value="1">Simple animation de l'image</option>
                    <option value="2">Animation + remplacement de fond</option>
                </select>
            </div>

            <!-- Upload image -->
            <div class="form-group">
                <label>Image de référence</label>
                <div class="file-upload">
                    <input type="file" id="imageInput" accept="image/*" required>
                    <label for="imageInput" class="file-upload-label" id="fileLabel">
                        📁 Cliquez pour sélectionner une image
                    </label>
                </div>
                <img id="imagePreview" alt="Preview">
            </div>

            <!-- Format vidéo -->
            <div class="form-group">
                <label>Format de la vidéo</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="format169" name="format" value="0" checked>
                        <label for="format169">16:9 (Horizontal)</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="format916" name="format" value="1">
                        <label for="format916">9:16 (Vertical)</label>
                    </div>
                </div>
            </div>

            <!-- Taille de sortie -->
            <div class="form-group">
                <label for="sizeScale">
                    Taille de la vidéo finale
                    <span class="slider-value" id="sizeValue">65%</span>
                </label>
                <div class="slider-container">
                    <input type="range" id="sizeScale" min="0.3" max="1.0" step="0.05" value="0.65">
                </div>
            </div>

            <!-- Longueur vidéo -->
            <div class="form-group">
                <label for="videoLength">
                    Longueur de la vidéo (frames)
                    <span class="slider-value" id="lengthValue">61</span>
                </label>
                <div class="slider-container">
                    <input type="range" id="videoLength" min="16" max="81" step="1" value="61">
                </div>
            </div>

            <!-- Prompt (maintenant textarea) -->
            <div class="form-group">
                <label for="prompt">Prompt (description du mouvement)</label>
                <textarea 
                    id="prompt" 
                    placeholder="Ex: Une personne sourit et cligne des yeux lentement, avec un léger mouvement de tête vers la droite. L'éclairage est doux et naturel."
                    rows="4"
                    required
                ></textarea>
            </div>

            <!-- Submit -->
            <button type="submit" class="generate-btn" id="generateBtn">
                🚀 Générer la vidéo
            </button>
        </form>

        <!-- Progress Section -->
        <div class="progress-section" id="progressSection">
            <div class="progress-header">
                <span class="progress-status" id="progressStatus">Initialisation...</span>
                <span class="progress-time" id="progressTime">0s</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            
            <h4 style="margin-bottom: 10px; color: #333;">📋 Logs en temps réel</h4>
            <div class="logs-section" id="logsSection"></div>
        </div>

        <!-- Video result -->
        <div class="video-result" id="videoResult">
            <h3>✅ Vidéo générée avec succès !</h3>
            <video controls id="videoPlayer"></video>
            <br>
            <a href="#" class="download-btn" id="downloadBtn" download="wan22_video.mp4">
                📥 Télécharger la vidéo
            </a>
        </div>
    </div>

    <script>
        // ⚙️ CONFIGURATION - À MODIFIER
        const RUNPOD_ENDPOINT_ID = 'VOTRE_ENDPOINT_ID'; // ← Mettez votre Endpoint ID
        const RUNPOD_API_KEY = 'VOTRE_API_KEY';         // ← Mettez votre API Key

        // Elements
        const form = document.getElementById('videoForm');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const fileLabel = document.getElementById('fileLabel');
        const sizeScale = document.getElementById('sizeScale');
        const sizeValue = document.getElementById('sizeValue');
        const videoLength = document.getElementById('videoLength');
        const lengthValue = document.getElementById('lengthValue');
        const generateBtn = document.getElementById('generateBtn');
        const progressSection = document.getElementById('progressSection');
        const progressStatus = document.getElementById('progressStatus');
        const progressTime = document.getElementById('progressTime');
        const progressBar = document.getElementById('progressBar');
        const logsSection = document.getElementById('logsSection');
        const videoResult = document.getElementById('videoResult');
        const videoPlayer = document.getElementById('videoPlayer');
        const downloadBtn = document.getElementById('downloadBtn');

        let startTime = null;
        let timerInterval = null;

        // Preview image
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    fileLabel.textContent = `✅ ${file.name}`;
                    fileLabel.classList.add('has-file');
                };
                reader.readAsDataURL(file);
            }
        });

        // Update sliders
        sizeScale.addEventListener('input', function() {
            const percent = Math.round(this.value * 100);
            sizeValue.textContent = `${percent}%`;
        });

        videoLength.addEventListener('input', function() {
            lengthValue.textContent = this.value;
        });

        // Form submit
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Reset UI
            videoResult.classList.remove('active');
            progressSection.classList.add('active');
            logsSection.innerHTML = '';
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';
            
            // Get form data
            const workflowType = parseInt(document.getElementById('workflowType').value);
            const format = parseInt(document.querySelector('input[name="format"]:checked').value);
            const scale = parseFloat(sizeScale.value);
            const length = parseInt(videoLength.value);
            const prompt = document.getElementById('prompt').value;

            // Get image as base64
            const file = imageInput.files[0];
            if (!file) {
                addLog('error', 'Veuillez sélectionner une image');
                return;
            }

            const imageBase64 = await fileToBase64(file);

            // Start timer
            startTime = Date.now();
            startTimer();

            // Disable button
            generateBtn.disabled = true;

            try {
                addLog('info', '📤 Envoi de la requête à RunPod...');
                updateProgress(5, 'Envoi de la requête...');

                // Send to RunPod
                const response = await fetch(`https://api.runpod.ai/v2/${RUNPOD_ENDPOINT_ID}/run`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${RUNPOD_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        input: {
                            workflow_type: workflowType,
                            format: format,
                            size_scale: scale,
                            video_length: length,
                            user_prompt: prompt,
                            image_base64: imageBase64.split(',')[1],
                            timeout: 900
                        }
                    })
                });

                const result = await response.json();

                if (result.error) {
                    addLog('error', `❌ Erreur: ${result.error}`);
                    updateProgress(0, 'Erreur');
                    generateBtn.disabled = false;
                    stopTimer();
                    return;
                }

                addLog('success', `✅ Job créé: ${result.id}`);
                updateProgress(10, 'Job en file d\'attente...');

                // Poll for result
                const jobId = result.id;
                pollJobStatus(jobId);

            } catch (error) {
                addLog('error', `❌ Erreur réseau: ${error.message}`);
                updateProgress(0, 'Erreur');
                generateBtn.disabled = false;
                stopTimer();
            }
        });

        // Poll job status
        async function pollJobStatus(jobId) {
            const maxAttempts = 450; // 15 minutes max
            let attempts = 0;
            let lastStatus = '';

            const interval = setInterval(async () => {
                attempts++;

                if (attempts > maxAttempts) {
                    clearInterval(interval);
                    addLog('error', '❌ Timeout: la génération a pris trop de temps (15 min)');
                    updateProgress(0, 'Timeout');
                    generateBtn.disabled = false;
                    stopTimer();
                    return;
                }

                try {
                    const response = await fetch(`https://api.runpod.ai/v2/${RUNPOD_ENDPOINT_ID}/status/${jobId}`, {
                        headers: {
                            'Authorization': `Bearer ${RUNPOD_API_KEY}`
                        }
                    });

                    const result = await response.json();
                    const status = result.status;

                    // Log status changes
                    if (status !== lastStatus) {
                        if (status === 'IN_QUEUE') {
                            addLog('info', '⏳ En file d\'attente...');
                            updateProgress(15, 'En file d\'attente');
                        } else if (status === 'IN_PROGRESS') {
                            addLog('info', '🎬 Génération en cours...');
                            updateProgress(30, 'Génération en cours');
                        }
                        lastStatus = status;
                    }

                    // Update progress bar during generation
                    if (status === 'IN_PROGRESS') {
                        const progress = 30 + (attempts * 0.5); // Increase slowly
                        updateProgress(Math.min(progress, 90), 'Génération en cours');
                    }

                    if (status === 'COMPLETED') {
                        clearInterval(interval);
                        stopTimer();
                        
                        addLog('success', '✅ Génération terminée !');
                        updateProgress(100, 'Terminé !');

                        const output = result.output;
                        
                        // Afficher les prompts
                        if (output.user_prompt) {
                            addLog('info', `📝 Prompt utilisateur: ${output.user_prompt}`);
                        }
                        if (output.wan_prompt) {
                            addLog('info', `🎬 Prompt Wan 2.2: ${output.wan_prompt}`);
                        }
                        
                        // Récupérer l'URL de téléchargement
                        if (output && output.download_url) {
                            const videoUrl = output.download_url;
                            addLog('success', `📹 Vidéo disponible !`);
                            displayVideo(videoUrl);
                        } else if (output && output.video_urls && output.video_urls.length > 0) {
                            const videoUrl = output.video_urls[0];
                            addLog('success', `📹 Vidéo disponible !`);
                            displayVideo(videoUrl);
                        } else {
                            addLog('warning', '⚠️ Vidéo générée mais URL non disponible');
                            addLog('info', 'La vidéo est sauvegardée dans votre volume RunPod');
                            console.log('Output:', output);
                        }
                        
                        generateBtn.disabled = false;
                        
                    } else if (status === 'FAILED') {
                        clearInterval(interval);
                        stopTimer();
                        
                        const errorMsg = result.error || 'Erreur inconnue';
                        addLog('error', `❌ Échec: ${errorMsg}`);
                        updateProgress(0, 'Échec');
                        generateBtn.disabled = false;
                    }
                } catch (error) {
                    console.error('Polling error:', error);
                    addLog('warning', `⚠️ Erreur de polling: ${error.message}`);
                }
            }, 2000); // Check every 2 seconds
        }

        // Display video
        function displayVideo(videoUrl) {
            videoPlayer.src = videoUrl;
            downloadBtn.href = videoUrl;
            videoResult.classList.add('active');
            
            // Scroll to video
            videoResult.scrollIntoView({ behavior: 'smooth' });
        }

        // Add log entry
        function addLog(type, message) {
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            
            const timestamp = new Date().toLocaleTimeString();
            logEntry.textContent = `[${timestamp}] ${message}`;
            
            logsSection.appendChild(logEntry);
            logsSection.scrollTop = logsSection.scrollHeight; // Auto-scroll
        }

        // Update progress bar
        function updateProgress(percent, status) {
            progressBar.style.width = `${percent}%`;
            progressBar.textContent = `${Math.round(percent)}%`;
            progressStatus.textContent = status;
        }

        // Timer
        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                progressTime.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // Utilities
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // Initial log
        addLog('info', '🚀 Interface prête. Configurez vos paramètres et lancez la génération.');
    </script>
</body>
</html>
